name: SRE Production Deployment

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v3
      
      - name: Generate version
        id: version
        run: echo "version=$(date +%Y%m%d)-${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --production=false
      
      - name: Run tests
        run: npm test
      
      - name: Run security scan
        run: |
          npm audit --production
          npx snyk test --severity-threshold=high
      
      - name: Build application
        run: npm run build
        env:
          NODE_ENV: production
      
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Login to Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            COMMIT=${{ github.sha }}

  slo-check:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Check current SLO status
        run: |
          ERROR_BUDGET=$(curl -s https://prometheus.ergo/api/v1/query \
            -d 'query=error_budget_remaining' | jq '.data.result[0].value[1]')
          
          if (( $(echo "$ERROR_BUDGET < 0.3" | bc -l) )); then
            echo "Error budget below 30%, blocking deployment"
            exit 1
          fi

  canary-deploy:
    runs-on: ubuntu-latest
    needs: [build, slo-check]
    environment: production-canary
    steps:
      - name: Deploy to canary (5%)
        run: |
          kubectl set image deployment/ergo-web \
            web=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.version }} \
            -n production-canary
          
          kubectl rollout status deployment/ergo-web -n production-canary
      
      - name: Wait and monitor canary
        run: |
          sleep 300  # 5 minutes
          
          # Check canary error rate
          ERROR_RATE=$(curl -s https://prometheus.ergo/api/v1/query \
            -d 'query=rate(http_requests_total{status=~"5..",deployment="canary"}[5m])' \
            | jq '.data.result[0].value[1]')
          
          if (( $(echo "$ERROR_RATE > 0.01" | bc -l) )); then
            echo "Canary error rate > 1%, rolling back"
            kubectl rollout undo deployment/ergo-web -n production-canary
            exit 1
          fi

  progressive-rollout:
    runs-on: ubuntu-latest
    needs: [build, canary-deploy]
    environment: production
    strategy:
      matrix:
        percentage: [25, 50, 75, 100]
    steps:
      - name: Rollout to ${{ matrix.percentage }}%
        run: |
          kubectl patch deployment ergo-web -n production \
            -p '{"spec":{"strategy":{"rollingUpdate":{"maxSurge":"${{ matrix.percentage }}%"}}}}'
          
          kubectl set image deployment/ergo-web \
            web=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.version }} \
            -n production
          
          kubectl rollout status deployment/ergo-web -n production
      
      - name: Monitor metrics
        run: |
          sleep 180  # 3 minutes per stage
          
          # Check error rate and latency
          ./scripts/check-slo.sh
          
          if [ $? -ne 0 ]; then
            echo "SLO violation detected, rolling back"
            kubectl rollout undo deployment/ergo-web -n production
            exit 1
          fi

  smoke-tests:
    runs-on: ubuntu-latest
    needs: progressive-rollout
    steps:
      - uses: actions/checkout@v3
      
      - name: Run smoke tests
        run: |
          npm run test:smoke
      
      - name: Run synthetic monitoring
        run: |
          npm run test:synthetic

  rollback:
    runs-on: ubuntu-latest
    needs: [progressive-rollout]
    if: failure()
    steps:
      - name: Automatic rollback
        run: |
          kubectl rollout undo deployment/ergo-web -n production
          kubectl rollout undo deployment/ergo-web -n production-canary
          
          # Send alert
          curl -X POST ${{ secrets.SLACK_WEBHOOK }} \
            -H 'Content-Type: application/json' \
            -d '{"text":"🚨 Deployment failed and rolled back"}' 