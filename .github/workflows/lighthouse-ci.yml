name: Quality Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ============================================
  # E2E Tests with Playwright
  # ============================================
  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        
      - name: Build application
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
          
      - name: Run E2E tests
        run: npx playwright test --project=chromium
        
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  # ============================================
  # Accessibility Audit with pa11y
  # ============================================
  accessibility:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build application
        run: npm run build
        
      - name: Start server
        run: npm start &
        env:
          PORT: 3000
          
      - name: Wait for server
        run: npx wait-on http://localhost:3000 --timeout 60000
        
      - name: Install pa11y
        run: npm install -g pa11y pa11y-ci
        
      - name: Run pa11y accessibility audit
        run: |
          echo "Running accessibility audit on key pages..."
          
          # Create pa11y config
          cat > .pa11yci.json << 'EOF'
          {
            "defaults": {
              "timeout": 30000,
              "wait": 2000,
              "standard": "WCAG2AA",
              "runners": ["axe"]
            },
            "urls": [
              "http://localhost:3000/",
              "http://localhost:3000/start",
              "http://localhost:3000/learn",
              "http://localhost:3000/learn/glossary",
              "http://localhost:3000/patterns",
              "http://localhost:3000/playbooks",
              "http://localhost:3000/topics",
              "http://localhost:3000/miners",
              "http://localhost:3000/hodlers",
              "http://localhost:3000/builders",
              "http://localhost:3000/compare",
              "http://localhost:3000/faq",
              "http://localhost:3000/infographics"
            ]
          }
          EOF
          
          # Run pa11y-ci
          pa11y-ci --config .pa11yci.json || echo "Some accessibility issues found - check report"
          
      - name: Upload accessibility report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: accessibility-report
          path: pa11y-results.json
          retention-days: 7

  # ============================================
  # Broken Links Checker
  # ============================================
  broken-links:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build application
        run: npm run build
        
      - name: Start server
        run: npm start &
        env:
          PORT: 3000
          
      - name: Wait for server
        run: npx wait-on http://localhost:3000 --timeout 60000
        
      - name: Check for broken links
        run: |
          npm install -g broken-link-checker
          
          echo "Checking for broken internal links..."
          
          # Check key pages for broken links (internal only, exclude external)
          blc http://localhost:3000 \
            --recursive \
            --exclude-external \
            --ordered \
            --filter-level 2 \
            --host-requests 5 \
            --requests 20 \
            > broken-links-report.txt 2>&1 || true
          
          # Show summary
          echo "=== Broken Links Summary ==="
          grep -E "^(BROKEN|Getting|Finished)" broken-links-report.txt | head -50 || echo "No broken links found!"
          
          # Count broken links
          BROKEN_COUNT=$(grep -c "^BROKEN" broken-links-report.txt || echo "0")
          echo "Total broken links found: $BROKEN_COUNT"
          
          if [ "$BROKEN_COUNT" -gt "10" ]; then
            echo "Warning: More than 10 broken links found!"
            exit 1
          fi
          
      - name: Upload broken links report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: broken-links-report
          path: broken-links-report.txt
          retention-days: 7

  # ============================================
  # Lighthouse Performance Audit
  # ============================================
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build application
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
          
      - name: Run Lighthouse CI
        run: |
          npm install -g @lhci/cli@0.13.x
          lhci autorun || echo "Lighthouse completed with warnings"
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
          
      - name: Upload Lighthouse results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-results
          path: .lighthouseci/
          retention-days: 7
          
  # ============================================
  # SEO Audit
  # ============================================
  seo-audit:
    runs-on: ubuntu-latest
    needs: lighthouse
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build application
        run: npm run build
        
      - name: Start server
        run: npm start &
        env:
          PORT: 3000
          
      - name: Wait for server
        run: npx wait-on http://localhost:3000
        
      - name: Run SEO audit
        run: |
          # Install SEO audit tools
          npm install -g sitemap-checker
          npm install -g broken-link-checker
          
          # Check sitemaps
          echo "🗺️ Checking sitemaps..."
          curl -f http://localhost:3000/sitemap.xml || echo "❌ Main sitemap not found"
          curl -f http://localhost:3000/sitemap-pages.xml || echo "❌ Pages sitemap not found"
          curl -f http://localhost:3000/sitemap-blog.xml || echo "❌ Blog sitemap not found"
          
          # Check robots.txt
          echo "🤖 Checking robots.txt..."
          curl -f http://localhost:3000/robots.txt || echo "❌ robots.txt not found"
          
          # Check key pages
          echo "📄 Checking key pages..."
          curl -f http://localhost:3000/ || echo "❌ Homepage not accessible"
          curl -f http://localhost:3000/blog || echo "❌ Blog not accessible"
          curl -f http://localhost:3000/technology || echo "❌ Technology page not accessible"
          
          # Check for common SEO issues
          echo "🔍 Running SEO checks..."
          node -e "
            const https = require('http');
            const pages = ['/', '/blog', '/technology', '/use'];
            
            pages.forEach(page => {
              https.get(\`http://localhost:3000\${page}\`, (res) => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  const hasTitle = data.includes('<title>');
                  const hasMetaDesc = data.includes('name=\"description\"');
                  const hasCanonical = data.includes('rel=\"canonical\"');
                  const hasOG = data.includes('property=\"og:');
                  const hasTwitter = data.includes('name=\"twitter:');
                  const hasStructuredData = data.includes('application/ld+json');
                  
                  console.log(\`📊 SEO Check for \${page}:\`);
                  console.log(\`  Title: \${hasTitle ? '✅' : '❌'}\`);
                  console.log(\`  Meta Description: \${hasMetaDesc ? '✅' : '❌'}\`);
                  console.log(\`  Canonical: \${hasCanonical ? '✅' : '❌'}\`);
                  console.log(\`  Open Graph: \${hasOG ? '✅' : '❌'}\`);
                  console.log(\`  Twitter Card: \${hasTwitter ? '✅' : '❌'}\`);
                  console.log(\`  Structured Data: \${hasStructuredData ? '✅' : '❌'}\`);
                  console.log('');
                });
              });
            });
          "
          
      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            let comment = '## Quality Pipeline Results\n\n';
            
            comment += '### Checks Completed\n';
            comment += '| Check | Status |\n';
            comment += '|-------|--------|\n';
            comment += '| E2E Tests | See playwright-report artifact |\n';
            comment += '| Accessibility (pa11y) | See accessibility-report artifact |\n';
            comment += '| Broken Links | See broken-links-report artifact |\n';
            comment += '| Lighthouse | See lighthouse-results artifact |\n';
            comment += '| SEO Audit | See workflow logs |\n\n';
            
            comment += '### SEO Checklist\n';
            comment += '- Sitemaps generated and accessible\n';
            comment += '- robots.txt configured\n';
            comment += '- Meta tags and structured data implemented\n';
            comment += '- Canonical URLs configured\n';
            comment += '- Open Graph and Twitter Cards\n\n';
            
            comment += '### Next Steps\n';
            comment += '1. Review any failed checks in the workflow logs\n';
            comment += '2. Download artifacts for detailed reports\n';
            comment += '3. Fix accessibility issues before merging\n';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  # ============================================
  # Summary Job - Runs after all checks
  # ============================================
  summary:
    runs-on: ubuntu-latest
    needs: [e2e-tests, accessibility, broken-links, lighthouse, seo-audit]
    if: always()
    
    steps:
      - name: Check results
        run: |
          echo "=== Quality Pipeline Summary ==="
          echo ""
          echo "E2E Tests: ${{ needs.e2e-tests.result }}"
          echo "Accessibility: ${{ needs.accessibility.result }}"
          echo "Broken Links: ${{ needs.broken-links.result }}"
          echo "Lighthouse: ${{ needs.lighthouse.result }}"
          echo "SEO Audit: ${{ needs.seo-audit.result }}"
          echo ""
          
          if [ "${{ needs.e2e-tests.result }}" == "failure" ] || \
             [ "${{ needs.accessibility.result }}" == "failure" ]; then
            echo "Critical checks failed!"
            exit 1
          fi
          
          echo "All critical checks passed!"
