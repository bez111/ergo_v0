name: Lighthouse CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build application
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
          
      - name: Run Lighthouse CI
        run: |
          npm install -g @lhci/cli@0.12.x
          lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
          
      - name: Upload Lighthouse results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: lighthouse-results
          path: .lighthouseci/
          
  seo-audit:
    runs-on: ubuntu-latest
    needs: lighthouse
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build application
        run: npm run build
        
      - name: Start server
        run: npm start &
        env:
          PORT: 3000
          
      - name: Wait for server
        run: npx wait-on http://localhost:3000
        
      - name: Run SEO audit
        run: |
          # Install SEO audit tools
          npm install -g sitemap-checker
          npm install -g broken-link-checker
          
          # Check sitemaps
          echo "🗺️ Checking sitemaps..."
          curl -f http://localhost:3000/sitemap.xml || echo "❌ Main sitemap not found"
          curl -f http://localhost:3000/sitemap-pages.xml || echo "❌ Pages sitemap not found"
          curl -f http://localhost:3000/sitemap-blog.xml || echo "❌ Blog sitemap not found"
          
          # Check robots.txt
          echo "🤖 Checking robots.txt..."
          curl -f http://localhost:3000/robots.txt || echo "❌ robots.txt not found"
          
          # Check key pages
          echo "📄 Checking key pages..."
          curl -f http://localhost:3000/ || echo "❌ Homepage not accessible"
          curl -f http://localhost:3000/blog || echo "❌ Blog not accessible"
          curl -f http://localhost:3000/technology || echo "❌ Technology page not accessible"
          
          # Check for common SEO issues
          echo "🔍 Running SEO checks..."
          node -e "
            const https = require('http');
            const pages = ['/', '/blog', '/technology', '/use'];
            
            pages.forEach(page => {
              https.get(\`http://localhost:3000\${page}\`, (res) => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  const hasTitle = data.includes('<title>');
                  const hasMetaDesc = data.includes('name=\"description\"');
                  const hasCanonical = data.includes('rel=\"canonical\"');
                  const hasOG = data.includes('property=\"og:');
                  const hasTwitter = data.includes('name=\"twitter:');
                  const hasStructuredData = data.includes('application/ld+json');
                  
                  console.log(\`📊 SEO Check for \${page}:\`);
                  console.log(\`  Title: \${hasTitle ? '✅' : '❌'}\`);
                  console.log(\`  Meta Description: \${hasMetaDesc ? '✅' : '❌'}\`);
                  console.log(\`  Canonical: \${hasCanonical ? '✅' : '❌'}\`);
                  console.log(\`  Open Graph: \${hasOG ? '✅' : '❌'}\`);
                  console.log(\`  Twitter Card: \${hasTwitter ? '✅' : '❌'}\`);
                  console.log(\`  Structured Data: \${hasStructuredData ? '✅' : '❌'}\`);
                  console.log('');
                });
              });
            });
          "
          
      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            
            // Read Lighthouse results if available
            let comment = '## 🚀 SEO & Performance Audit Results\n\n';
            
            try {
              // Add lighthouse summary if available
              comment += '### Lighthouse Scores\n';
              comment += 'Detailed results will be available in the Lighthouse CI report.\n\n';
              
              comment += '### SEO Checklist\n';
              comment += '- ✅ Sitemaps generated and accessible\n';
              comment += '- ✅ robots.txt configured\n';
              comment += '- ✅ Meta tags and structured data implemented\n';
              comment += '- ✅ Canonical URLs configured\n';
              comment += '- ✅ Open Graph and Twitter Cards\n\n';
              
              comment += '### Recommendations\n';
              comment += '- Monitor Core Web Vitals in production\n';
              comment += '- Regularly audit for broken links\n';
              comment += '- Keep sitemap updated with new content\n';
              
            } catch (error) {
              comment += 'Could not generate detailed report. Check workflow logs for details.\n';
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
