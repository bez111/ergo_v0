[databases]
ergo_production = host=postgres-primary.production port=5432 dbname=ergo
ergo_readonly = host=postgres-replica.production port=5432 dbname=ergo

[pgbouncer]
listen_addr = *
listen_port = 6432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

# Connection pool settings
pool_mode = transaction
max_client_conn = 1000
default_pool_size = 25
min_pool_size = 5
reserve_pool_size = 5
reserve_pool_timeout = 3
max_db_connections = 100
max_user_connections = 100

# Timeouts
server_lifetime = 3600
server_idle_timeout = 600
server_connect_timeout = 15
server_login_retry = 15
query_timeout = 120
query_wait_timeout = 120
client_idle_timeout = 0
client_login_timeout = 60
idle_transaction_timeout = 300

# Performance
pkt_buf = 4096
max_packet_size = 2147483647
listen_backlog = 128
sbuf_loopcnt = 5
suspend_timeout = 10
tcp_defer_accept = 0
tcp_socket_buffer = 0

# Logging
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1
log_stats = 1
stats_period = 60
verbose = 0

# Admin
admin_users = postgres, admin
stats_users = stats, monitoring

# Security
server_check_delay = 30
server_check_query = select 1
server_fast_close = 0
server_round_robin = 0
ignore_startup_parameters = extra_float_digits

# Connection limits per user/database
[limits]
ergo_production = max_user_connections=50
ergo_readonly = max_user_connections=100 