# Crowdin Configuration
# https://developer.crowdin.com/configuration-file/
#
# To use Crowdin:
# 1. Create a free account at https://crowdin.com (free for open source)
# 2. Create a new project
# 3. Add your API token to .env.local as CROWDIN_TOKEN
# 4. Run: npx @crowdin/cli upload sources
# 5. Run: npx @crowdin/cli download

project_id_env: CROWDIN_PROJECT_ID
api_token_env: CROWDIN_TOKEN

preserve_hierarchy: true

files:
  # Common translations
  - source: /messages/en/common.json
    translation: /messages/%two_letters_code%/common.json
    
  # Home page
  - source: /messages/en/home.json
    translation: /messages/%two_letters_code%/home.json
    
