<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:0.8"/>
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:0.1"/>
    </radialGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="100%" style="stop-color:#1a0b2e"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)"/>
  
  <!-- Grid Pattern -->
  <g opacity="0.3">
    <defs>
      <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
        <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#8b5cf6" stroke-width="0.5"/>
      </pattern>
    </defs>
    <rect width="100%" height="100%" fill="url(#grid)"/>
  </g>
  
  <!-- Central Orb -->
  <circle cx="600" cy="315" r="120" fill="url(#centerGlow)"/>
  <circle cx="600" cy="315" r="100" fill="none" stroke="#ec4899" stroke-width="2" opacity="0.8"/>
  <circle cx="600" cy="315" r="80" fill="none" stroke="#8b5cf6" stroke-width="1" opacity="0.6"/>
  <circle cx="600" cy="315" r="60" fill="none" stroke="#ec4899" stroke-width="1" opacity="0.4"/>
  
  <!-- Flowing Lines -->
  <g stroke="#06b6d4" stroke-width="2" fill="none" opacity="0.6">
    <path d="M100,200 Q300,150 500,200 T900,180"/>
    <path d="M100,400 Q400,350 700,380 T1100,360"/>
    <path d="M200,100 Q500,80 800,120 T1100,100"/>
    <path d="M100,500 Q350,480 600,500 T1000,520"/>
  </g>
  
  <!-- Particles -->
  <g fill="#ec4899" opacity="0.8">
    <circle cx="200" cy="150" r="3"/>
    <circle cx="800" cy="180" r="2"/>
    <circle cx="150" cy="400" r="2"/>
    <circle cx="950" cy="350" r="3"/>
    <circle cx="300" cy="500" r="2"/>
    <circle cx="1050" cy="250" r="2"/>
  </g>
  
  <!-- Floating Geometric Elements -->
  <g opacity="0.4">
    <polygon points="150,100 180,130 150,160 120,130" fill="none" stroke="#8b5cf6" stroke-width="1"/>
    <polygon points="1000,450 1030,480 1000,510 970,480" fill="none" stroke="#ec4899" stroke-width="1"/>
    <rect x="100" y="300" width="30" height="30" fill="none" stroke="#06b6d4" stroke-width="1"/>
    <rect x="1050" y="150" width="25" height="25" fill="none" stroke="#8b5cf6" stroke-width="1"/>
  </g>
</svg>