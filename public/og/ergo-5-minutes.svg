<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="sphereGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#ec4899"/>
      <stop offset="30%" style="stop-color:#8b5cf6"/>
      <stop offset="60%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1e40af"/>
    </radialGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)"/>
  
  <!-- Energy Flow Lines -->
  <g stroke="#06b6d4" stroke-width="2" fill="none" opacity="0.6">
    <!-- Left flowing lines -->
    <path d="M50,100 Q200,80 350,120 Q500,160 600,200">
      <animate attributeName="stroke-dasharray" values="0,1000;20,980;0,1000" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M80,200 Q220,180 380,220 Q520,260 600,280">
      <animate attributeName="stroke-dasharray" values="0,1000;25,975;0,1000" dur="2.5s" repeatCount="indefinite"/>
    </path>
    <path d="M30,300 Q180,280 330,320 Q480,360 600,380">
      <animate attributeName="stroke-dasharray" values="0,1000;30,970;0,1000" dur="3.5s" repeatCount="indefinite"/>
    </path>
    
    <!-- Right flowing lines -->
    <path d="M600,250 Q750,210 900,250 Q1050,290 1150,320">
      <animate attributeName="stroke-dasharray" values="0,1000;20,980;0,1000" dur="2.8s" repeatCount="indefinite"/>
    </path>
    <path d="M600,350 Q720,310 860,350 Q980,390 1120,420">
      <animate attributeName="stroke-dasharray" values="0,1000;25,975;0,1000" dur="3.2s" repeatCount="indefinite"/>
    </path>
    <path d="M600,450 Q740,410 880,450 Q1020,490 1170,520">
      <animate attributeName="stroke-dasharray" values="0,1000;30,970;0,1000" dur="2.7s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- Central Energy Sphere -->
  <g transform="translate(600,315)">
    <!-- Main sphere -->
    <circle r="100" fill="url(#sphereGrad)" opacity="0.9"/>
    
    <!-- Inner energy rings -->
    <circle r="80" fill="none" stroke="#ec4899" stroke-width="1" opacity="0.8">
      <animate attributeName="r" values="80;85;80" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle r="60" fill="none" stroke="#8b5cf6" stroke-width="1" opacity="0.6">
      <animate attributeName="r" values="60;65;60" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle r="40" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.4">
      <animate attributeName="r" values="40;45;40" dur="1s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Energy particles inside -->
    <g opacity="0.8">
      <circle cx="20" cy="10" r="2" fill="#ffffff">
        <animateTransform attributeName="transform" type="rotate" values="0 0 0;360 0 0" dur="4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="-30" cy="20" r="3" fill="#06b6d4">
        <animateTransform attributeName="transform" type="rotate" values="0 0 0;-360 0 0" dur="3s" repeatCount="indefinite"/>
      </circle>
      <circle cx="10" cy="-40" r="2" fill="#ec4899">
        <animateTransform attributeName="transform" type="rotate" values="0 0 0;360 0 0" dur="5s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>
  
  <!-- Outer Energy Nodes -->
  <g opacity="0.7">
    <circle cx="150" cy="150" r="15" fill="#8b5cf6" opacity="0.8"/>
    <circle cx="1050" cy="150" r="15" fill="#ec4899" opacity="0.8"/>
    <circle cx="150" cy="480" r="15" fill="#06b6d4" opacity="0.8"/>
    <circle cx="1050" cy="480" r="15" fill="#f97316" opacity="0.8"/>
    
    <!-- Pulsing effect -->
    <circle cx="150" cy="150" r="15" fill="none" stroke="#8b5cf6" stroke-width="2">
      <animate attributeName="r" values="15;25;15" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1050" cy="150" r="15" fill="none" stroke="#ec4899" stroke-width="2">
      <animate attributeName="r" values="15;25;15" dur="2.3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2.3s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Floating geometric elements -->
  <g opacity="0.4">
    <polygon points="100,300 120,280 140,300 120,320" fill="none" stroke="#06b6d4" stroke-width="1">
      <animateTransform attributeName="transform" type="rotate" values="0 120 300;360 120 300" dur="6s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="1060,350 1080,330 1100,350 1080,370" fill="none" stroke="#ec4899" stroke-width="1">
      <animateTransform attributeName="transform" type="rotate" values="0 1080 350;-360 1080 350" dur="5s" repeatCount="indefinite"/>
    </polygon>
  </g>
</svg>