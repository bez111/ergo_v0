<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#000000"/>
  
  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#333333" stroke-width="1" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Gradient overlay -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF7A00;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#FF7A00;stop-opacity:0.3"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#gradient)"/>
  
  <!-- Ergo logo/text -->
  <text x="600" y="280" text-anchor="middle" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="72" font-weight="bold">
    ERGO
  </text>
  <text x="600" y="320" text-anchor="middle" fill="#FF7A00" font-family="Arial, sans-serif" font-size="32" font-weight="normal">
    BLOCKCHAIN
  </text>
  
  <!-- Blog indicator -->
  <text x="600" y="380" text-anchor="middle" fill="#CCCCCC" font-family="Arial, sans-serif" font-size="24" font-weight="normal">
    Blog Article
  </text>
  
  <!-- Decorative elements -->
  <circle cx="200" cy="150" r="3" fill="#FF7A00" opacity="0.6"/>
  <circle cx="1000" cy="480" r="3" fill="#FF7A00" opacity="0.6"/>
  <circle cx="150" cy="500" r="2" fill="#FFFFFF" opacity="0.4"/>
  <circle cx="1050" cy="150" r="2" fill="#FFFFFF" opacity="0.4"/>
</svg>
