<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#000000"/>
  
  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#333333" stroke-width="1" opacity="0.2"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Gradient overlay -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF7A00;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#FF7A00;stop-opacity:0.4"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#gradient)"/>
  
  <!-- Main title -->
  <text x="600" y="250" text-anchor="middle" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="84" font-weight="bold">
    ERGO BLOG
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="320" text-anchor="middle" fill="#FF7A00" font-family="Arial, sans-serif" font-size="36" font-weight="normal">
    Latest Updates, Research & Guides
  </text>
  
  <!-- Description -->
  <text x="600" y="380" text-anchor="middle" fill="#CCCCCC" font-family="Arial, sans-serif" font-size="24" font-weight="normal">
    Deep-dives into Ergo's technology and ecosystem
  </text>
  
  <!-- Decorative elements -->
  <circle cx="150" cy="120" r="4" fill="#FF7A00" opacity="0.8"/>
  <circle cx="1050" cy="510" r="4" fill="#FF7A00" opacity="0.8"/>
  <circle cx="100" cy="550" r="3" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="1100" cy="80" r="3" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="200" cy="80" r="2" fill="#FF7A00" opacity="0.5"/>
  <circle cx="1000" cy="550" r="2" fill="#FF7A00" opacity="0.5"/>
</svg>
