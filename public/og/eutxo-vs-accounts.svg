<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c0c0c"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="40%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:0.8"/>
      <stop offset="50%" style="stop-color:#dc2626;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#7c2d12;stop-opacity:0.1"/>
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)"/>
  
  <!-- Hexagonal Grid -->
  <g opacity="0.2">
    <defs>
      <pattern id="hexGrid" width="60" height="52" patternUnits="userSpaceOnUse">
        <polygon points="30,4 45,12 45,28 30,36 15,28 15,12" 
                 fill="none" stroke="#f97316" stroke-width="0.5"/>
      </pattern>
    </defs>
    <rect width="100%" height="100%" fill="url(#hexGrid)"/>
  </g>
  
  <!-- Central Network Node -->
  <g transform="translate(600,315)">
    <!-- Core -->
    <circle r="60" fill="url(#centerGlow)"/>
    <circle r="50" fill="none" stroke="#f97316" stroke-width="2" opacity="0.9"/>
    <circle r="35" fill="none" stroke="#dc2626" stroke-width="1" opacity="0.7"/>
    <circle r="20" fill="none" stroke="#f97316" stroke-width="1" opacity="0.5"/>
    
    <!-- Connecting Lines -->
    <g stroke="#06b6d4" stroke-width="2" fill="none" opacity="0.6">
      <path d="M-50,0 L-200,-100"/>
      <path d="M50,0 L200,-100"/>
      <path d="M-35,35 L-150,150"/>
      <path d="M35,35 L150,150"/>
      <path d="M-35,-35 L-150,-150"/>
      <path d="M35,-35 L150,-150"/>
      <path d="M0,50 L0,200"/>
      <path d="M0,-50 L0,-200"/>
    </g>
    
    <!-- Outer Nodes -->
    <g>
      <circle cx="-200" cy="-100" r="12" fill="#06b6d4" opacity="0.8"/>
      <circle cx="200" cy="-100" r="12" fill="#06b6d4" opacity="0.8"/>
      <circle cx="-150" cy="150" r="12" fill="#8b5cf6" opacity="0.8"/>
      <circle cx="150" cy="150" r="12" fill="#8b5cf6" opacity="0.8"/>
      <circle cx="-150" cy="-150" r="12" fill="#ec4899" opacity="0.8"/>
      <circle cx="150" cy="-150" r="12" fill="#ec4899" opacity="0.8"/>
      <circle cx="0" cy="200" r="12" fill="#f97316" opacity="0.8"/>
      <circle cx="0" cy="-200" r="12" fill="#f97316" opacity="0.8"/>
    </g>
  </g>
  
  <!-- Data Packets -->
  <g>
    <circle cx="300" cy="150" r="6" fill="#06b6d4" opacity="0.9">
      <animate attributeName="cx" values="300;400;500" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;0.3;0.9" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="900" cy="480" r="6" fill="#ec4899" opacity="0.9">
      <animate attributeName="cx" values="900;800;700" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;0.3;0.9" dur="2.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Corner Elements -->
  <g opacity="0.3">
    <polygon points="50,50 80,50 80,80 50,80" fill="none" stroke="#8b5cf6" stroke-width="1"/>
    <polygon points="1120,50 1150,50 1150,80 1120,80" fill="none" stroke="#ec4899" stroke-width="1"/>
    <polygon points="50,550 80,550 80,580 50,580" fill="none" stroke="#06b6d4" stroke-width="1"/>
    <polygon points="1120,550 1150,550 1150,580 1120,580" fill="none" stroke="#f97316" stroke-width="1"/>
  </g>
</svg>